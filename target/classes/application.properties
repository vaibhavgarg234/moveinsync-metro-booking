spring.application.name=metro-booking

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./metro_booking;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── JWT ───────────────────────────────────────────────────────────────────────
metro.jwt.secret=moveinsync-jwt-secret-key-must-be-256-bits-long!!
metro.jwt.expiry-ms=900000

# ── QR ────────────────────────────────────────────────────────────────────────
metro.qr.secret-key=moveinsync-metro-secret-key-2024

# ── Graph ─────────────────────────────────────────────────────────────────────
metro.graph.transfer-penalty-minutes=5.0
metro.seed-demo-data=false

# ── Caching (Caffeine) ────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=10m

# ── Actuator (monitoring) ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.moveinsync=INFO
logging.level.org.springframework.security=WARN